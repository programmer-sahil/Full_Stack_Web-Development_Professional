<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Events</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eff6ff;
            padding: 30px;
        }

        button {
            border: 0;
            border-radius: 8px;
            background-color: #2563eb;
            color: #ffffff;
            padding: 12px 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Events</h1>
    <p id="message">Click the button to change this message.</p>
    <button type="button" id="changeButton">Change Message</button>

    <script>
        // An event listener runs code when the user does something
        const button = document.getElementById("changeButton");
        const message = document.getElementById("message");

        // This function runs when the button is clicked
        button.addEventListener("click", function () {
            message.textContent = "The click event worked successfully.";
        });
    </script>
</body>
</html>
