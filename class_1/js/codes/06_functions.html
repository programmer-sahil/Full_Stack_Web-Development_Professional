<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Functions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fdf2f8;
            padding: 30px;
        }

        button {
            border: 0;
            border-radius: 8px;
            background-color: #db2777;
            color: #ffffff;
            padding: 12px 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Functions</h1>
    <p id="message">Click the button to run a function.</p>
    <button type="button" onclick="showWelcomeMessage()">Run Function</button>

    <script>
        // A function is a reusable block of code
        function showWelcomeMessage() {
            document.getElementById("message").textContent =
                "Welcome to JavaScript functions!";
        }
    </script>
</body>
</html>
