<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map and Filter Intro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8fafc;
            padding: 30px;
        }

        .section {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 16px;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <h1>map() and filter()</h1>

    <div class="section">
        <h2>All Students</h2>
        <ul id="allStudents"></ul>
    </div>

    <div class="section">
        <h2>Passed Students</h2>
        <ul id="passedStudents"></ul>
    </div>

    <script>
        // This array of objects is similar to data used in React projects
        const students = [
            { name: "Ayesha", marks: 85 },
            { name: "Rahul", marks: 45 },
            { name: "Meera", marks: 72 }
        ];

        // map() creates a new array by changing each item
        const allStudentItems = students.map(function (student) {
            return `<li>${student.name} scored ${student.marks}</li>`;
        });

        // filter() creates a new array with only matching items
        const passedStudentItems = students
            .filter(function (student) {
                return student.marks >= 50;
            })
            .map(function (student) {
                return `<li>${student.name} passed</li>`;
            });

        // This block renders array data in the DOM
        document.getElementById("allStudents").innerHTML = allStudentItems.join("");
        document.getElementById("passedStudents").innerHTML = passedStudentItems.join("");
    </script>
</body>
</html>
