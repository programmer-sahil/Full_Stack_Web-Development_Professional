<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Conditions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef2ff;
            padding: 30px;
        }

        .message {
            background-color: #ffffff;
            border-left: 6px solid #4f46e5;
            border-radius: 8px;
            padding: 20px;
            max-width: 560px;
        }
    </style>
</head>
<body>
    <h1>Conditions</h1>
    <div class="message" id="message"></div>

    <script>
        // Conditions help JavaScript make decisions
        const score = 76;
        let resultMessage = "";

        if (score >= 80) {
            resultMessage = "Excellent work!";
        } else if (score >= 50) {
            resultMessage = "Good job. Keep practicing.";
        } else {
            resultMessage = "Revise the basics and try again.";
        }

        // This line displays the decision result
        document.getElementById("message").textContent = resultMessage;
    </script>
</body>
</html>
