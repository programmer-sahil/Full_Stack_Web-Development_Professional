<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Operators</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff7ed;
            padding: 30px;
        }

        .result {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 18px;
            max-width: 520px;
        }
    </style>
</head>
<body>
    <h1>Operators</h1>
    <div class="result" id="result"></div>

    <script>
        // Operators are used to calculate or compare values
        const htmlMarks = 80;
        const cssMarks = 85;
        const totalMarks = htmlMarks + cssMarks;
        const isPassed = totalMarks >= 100;

        // This block prints calculation and comparison results
        document.getElementById("result").innerHTML = `
            <p>HTML Marks: ${htmlMarks}</p>
            <p>CSS Marks: ${cssMarks}</p>
            <p>Total Marks: ${totalMarks}</p>
            <p>Passed: ${isPassed}</p>
        `;
    </script>
</body>
</html>
