<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic setup for the profile card project -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Project 1 - Profile Card</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #dbeafe, #dcfce7);
            padding: 20px;
        }

        /* This class styles the main card */
        .profile-card {
            width: 340px;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 26px;
            text-align: center;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.16);
        }

        .avatar {
            width: 92px;
            height: 92px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background-color: #2563eb;
            color: #ffffff;
            font-size: 34px;
            font-weight: bold;
        }

        .role {
            color: #2563eb;
            font-weight: bold;
        }

        .skills {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .skills span {
            background-color: #eef2ff;
            color: #3730a3;
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 14px;
        }

        .contact-button {
            display: inline-block;
            width: 100%;
            border-radius: 8px;
            background-color: #16a34a;
            color: #ffffff;
            padding: 12px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- This section creates the profile card layout -->
    <main class="profile-card">
        <div class="avatar">SS</div>
        <h1>SK SAHIL</h1>
        <p class="role">Full Stack Project Mentor</p>
        <p>I help students learn coding through practical, project-based training.</p>

        <!-- Skills are shown as small reusable UI tags -->
        <div class="skills">
            <span>HTML</span>
            <span>CSS</span>
            <span>JavaScript</span>
        </div>

        <a class="contact-button" href="mailto:hello@example.com">Contact Me</a>
    </main>
</body>
</html>
