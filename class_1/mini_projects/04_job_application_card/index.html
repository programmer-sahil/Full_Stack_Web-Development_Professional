<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic setup for the job application card project -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Project 4 - Job Application Card</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background-color: #f8fafc;
            padding: 20px;
        }

        /* This card is a small real-world UI block */
        .job-card {
            width: 380px;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.14);
            border-top: 6px solid #2563eb;
        }

        .company {
            color: #2563eb;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status {
            display: inline-block;
            border-radius: 999px;
            background-color: #fef3c7;
            color: #92400e;
            padding: 7px 12px;
            font-weight: bold;
        }

        .meta {
            color: #64748b;
        }

        button {
            width: 100%;
            border: 0;
            border-radius: 8px;
            background-color: #2563eb;
            color: #ffffff;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- This section teaches UI thinking for a job application tracker -->
    <article class="job-card">
        <p class="company">TechNova Solutions</p>
        <h1>Frontend Developer Intern</h1>
        <p class="meta">Applied Date: 12 May 2026</p>
        <p>Status: <span class="status">Interview Scheduled</span></p>
        <p>This card can later become part of a full Job Application Tracker project.</p>
        <button type="button">View Details</button>
    </article>
</body>
</html>
