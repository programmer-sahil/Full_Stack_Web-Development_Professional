<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic browser setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headings and Paragraphs</title>
</head>
<body>
    <!-- Headings show title importance from h1 to h6 -->
    <h1>Main Page Heading</h1>
    <h2>Section Heading</h2>
    <h3>Sub Section Heading</h3>
    <h4>Small Heading</h4>
    <h5>Smaller Heading</h5>
    <h6>Smallest Heading</h6>

    <!-- Paragraphs are used for normal readable text -->
    <p>
        Web development starts with understanding how content is written on a page.
        Headings create structure and paragraphs explain details.
    </p>
</body>
</html>
