<!DOCTYPE html>
<html lang="en">
<head>
    <!-- The head section stores page information for the browser -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Structure</title>
</head>
<body>
    <!-- The body section stores visible content for users -->
    <h1>Welcome to Full Stack Web Development</h1>
    <p>This is our first HTML page for Class 1.</p>

    <!-- HTML gives structure to a webpage -->
    <p>HTML means HyperText Markup Language.</p>
</body>
</html>
