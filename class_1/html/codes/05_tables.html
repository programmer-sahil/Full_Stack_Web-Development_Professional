<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
    <style>
        /* Simple table styling for readability */
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 600px;
        }

        th,
        td {
            border: 1px solid #cccccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #e8f0ff;
        }
    </style>
</head>
<body>
    <h1>Student Course Table</h1>

    <!-- Tables show data in rows and columns -->
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Course</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ayesha</td>
                <td>Full Stack Web Development</td>
                <td>Learning HTML</td>
            </tr>
            <tr>
                <td>Rahul</td>
                <td>Full Stack Web Development</td>
                <td>Learning CSS</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
