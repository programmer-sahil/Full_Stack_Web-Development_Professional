<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Lists</title>
</head>
<body>
    <h1>HTML Lists</h1>

    <!-- Unordered lists are useful when order is not important -->
    <h2>Skills to Learn</h2>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

    <!-- Ordered lists are useful for step-by-step instructions -->
    <h2>Learning Steps</h2>
    <ol>
        <li>Understand structure</li>
        <li>Add styling</li>
        <li>Add interactivity</li>
    </ol>
</body>
</html>
