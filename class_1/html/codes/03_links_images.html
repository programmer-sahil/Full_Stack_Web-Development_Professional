<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links and Images</title>
</head>
<body>
    <h1>Links and Images</h1>

    <!-- The anchor tag creates clickable links -->
    <p>
        Visit
        <a href="https://developer.mozilla.org/" target="_blank">MDN Web Docs</a>
        to learn web development.
    </p>

    <!-- The image tag shows an image on the webpage -->
    <img
        src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=600"
        alt="Laptop showing web development work"
        width="400"
    >
</body>
</html>
