<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card UI</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e0f2fe, #fef3c7);
        }

        /* This class styles a clean reusable card */
        .card {
            width: 320px;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
        }

        .badge {
            display: inline-block;
            background-color: #dcfce7;
            color: #166534;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 14px;
            font-weight: bold;
        }

        .card h1 {
            margin-bottom: 8px;
        }

        .card p {
            color: #4b5563;
            line-height: 1.6;
        }

        .card button {
            width: 100%;
            border: 0;
            border-radius: 8px;
            padding: 12px;
            background-color: #2563eb;
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- This card is similar to small UI blocks used in real apps -->
    <div class="card">
        <span class="badge">Class 1</span>
        <h1>Frontend Basics</h1>
        <p>Learn HTML structure, CSS styling, and JavaScript interaction before React.</p>
        <button type="button">Start Learning</button>
    </div>
</body>
</html>
