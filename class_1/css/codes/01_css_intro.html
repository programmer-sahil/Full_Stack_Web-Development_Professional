<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Introduction</title>
    <style>
        /* CSS changes how HTML elements look */
        body {
            font-family: Arial, sans-serif;
            background-color: #eef6ff;
            color: #1f2937;
            margin: 0;
            padding: 40px;
        }

        /* This class styles the main content box */
        .lesson-box {
            background-color: #ffffff;
            border-left: 6px solid #2563eb;
            border-radius: 8px;
            padding: 24px;
            max-width: 650px;
        }

        h1 {
            color: #2563eb;
        }
    </style>
</head>
<body>
    <!-- This section introduces CSS styling -->
    <div class="lesson-box">
        <h1>CSS Introduction</h1>
        <p>CSS means Cascading Style Sheets.</p>
        <p>It controls colors, spacing, fonts, layout, and responsive design.</p>
    </div>
</body>
</html>
