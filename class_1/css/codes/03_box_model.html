<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        /* Border-box makes width calculation easier for beginners */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #fff7ed;
            padding: 30px;
        }

        /* This class demonstrates content, padding, border, and margin */
        .box {
            width: 320px;
            margin: 30px auto;
            padding: 24px;
            border: 4px solid #f97316;
            border-radius: 8px;
            background-color: #ffffff;
        }

        .label {
            color: #9a3412;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>CSS Box Model</h1>

    <!-- Every HTML element is treated like a box -->
    <div class="box">
        <p class="label">Content Area</p>
        <p>Padding creates space inside the box.</p>
        <p>Border wraps the box.</p>
        <p>Margin creates space outside the box.</p>
    </div>
</body>
</html>
