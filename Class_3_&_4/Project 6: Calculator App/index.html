<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Supports modern characters and symbols -->
  <meta charset="UTF-8">

  <!-- Makes the app responsive on mobile and desktop -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Browser tab title -->
  <title>Calculator App</title>

  <!-- External CSS file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Main calculator wrapper -->
  <div class="calculator-container">

    <!-- Calculator heading -->
    <h1>Calculator App</h1>
    <p class="subtitle">Basic arithmetic calculator using JavaScript</p>

    <!-- Calculator body -->
    <div class="calculator">

      <!-- 
        Display screen.
        readonly means user cannot type directly.
        JavaScript will update this display.
      -->
      <input 
        type="text" 
        id="display" 
        placeholder="0" 
        readonly
      >

      <!-- Calculator buttons -->
      <div class="buttons">

        <!-- Clear all button -->
        <button class="btn clear-btn" onclick="clearDisplay()">C</button>

        <!-- Delete last character button -->
        <button class="btn delete-btn" onclick="deleteLast()">DEL</button>

        <!-- Operator buttons -->
        <button class="btn operator-btn" onclick="appendValue('%')">%</button>
        <button class="btn operator-btn" onclick="appendValue('/')">÷</button>

        <!-- Number buttons -->
        <button class="btn" onclick="appendValue('7')">7</button>
        <button class="btn" onclick="appendValue('8')">8</button>
        <button class="btn" onclick="appendValue('9')">9</button>
        <button class="btn operator-btn" onclick="appendValue('*')">×</button>

        <button class="btn" onclick="appendValue('4')">4</button>
        <button class="btn" onclick="appendValue('5')">5</button>
        <button class="btn" onclick="appendValue('6')">6</button>
        <button class="btn operator-btn" onclick="appendValue('-')">−</button>

        <button class="btn" onclick="appendValue('1')">1</button>
        <button class="btn" onclick="appendValue('2')">2</button>
        <button class="btn" onclick="appendValue('3')">3</button>
        <button class="btn operator-btn" onclick="appendValue('+')">+</button>

        <button class="btn zero-btn" onclick="appendValue('0')">0</button>
        <button class="btn" onclick="appendValue('.')">.</button>

        <!-- Equal button -->
        <button class="btn equal-btn" onclick="calculateResult()">=</button>

      </div>
    </div>

    <p class="footer-text">Project 6: JavaScript Logic Practice</p>

  </div>

  <!-- External JavaScript file -->
  <script src="script.js"></script>
</body>
</html>
