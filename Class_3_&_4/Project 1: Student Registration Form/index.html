<!DOCTYPE html>
<html lang="en">
<head>
  <!-- 
    charset="UTF-8" supports almost all characters and symbols.
    It is a standard setting for modern websites.
  -->
  <meta charset="UTF-8">

  <!-- 
    viewport makes the website responsive on mobile, tablet, and desktop.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Page title shown in browser tab -->
  <title>Student Registration Form</title>

  <!-- External CSS file link -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Main container of the project -->
  <div class="container">

    <!-- Form heading -->
    <h1>Student Registration Form</h1>

    <!-- Short description -->
    <p class="subtitle">Fill in the details to register a student</p>

    <!-- 
      form tag is used to collect user input.
      id="studentForm" will be used in JavaScript to select this form.
    -->
    <form id="studentForm">

      <!-- Student name input group -->
      <div class="form-group">
        <label for="studentName">Student Name</label>

        <!-- 
          type="text" means normal text input.
          id is used by JavaScript.
          placeholder shows hint text.
        -->
        <input 
          type="text" 
          id="studentName" 
          placeholder="Enter student name"
        >
      </div>

      <!-- Email input group -->
      <div class="form-group">
        <label for="studentEmail">Email Address</label>

        <!-- type="email" checks basic email format in browser -->
        <input 
          type="email" 
          id="studentEmail" 
          placeholder="Enter email address"
        >
      </div>

      <!-- Phone number input group -->
      <div class="form-group">
        <label for="studentPhone">Phone Number</label>

        <input 
          type="text" 
          id="studentPhone" 
          placeholder="Enter phone number"
        >
      </div>

      <!-- Course input group -->
      <div class="form-group">
        <label for="studentCourse">Course Name</label>

        <input 
          type="text" 
          id="studentCourse" 
          placeholder="Enter course name"
        >
      </div>

      <!-- Age input group -->
      <div class="form-group">
        <label for="studentAge">Age</label>

        <input 
          type="number" 
          id="studentAge" 
          placeholder="Enter age"
        >
      </div>

      <!-- Gender dropdown -->
      <div class="form-group">
        <label for="studentGender">Gender</label>

        <select id="studentGender">
          <option value="">Select gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <!-- Submit button -->
      <button type="submit">Register Student</button>
    </form>

    <!-- 
      Error message will be shown here using JavaScript.
    -->
    <p id="errorMessage"></p>

    <!-- 
      Student details will be displayed here after successful registration.
    -->
    <div id="studentOutput"></div>

  </div>

  <!-- External JavaScript file link -->
  <script src="script.js"></script>
</body>
</html>
