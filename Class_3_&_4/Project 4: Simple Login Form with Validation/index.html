<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Supports modern characters and symbols -->
  <meta charset="UTF-8">

  <!-- Makes website responsive on mobile, tablet, and desktop -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Browser tab title -->
  <title>Simple Login Form</title>

  <!-- External CSS file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Main login card -->
  <div class="login-container">

    <!-- Login form left/top section -->
    <div class="login-header">
      <h1>Welcome Back</h1>
      <p>Login to continue to your dashboard</p>
    </div>

    <!-- 
      Login form.
      JavaScript will select this form using id="loginForm".
    -->
    <form id="loginForm">

      <!-- Email field group -->
      <div class="form-group">
        <label for="email">Email Address</label>

        <input
          type="email"
          id="email"
          placeholder="Enter your email"
        >

        <!-- Email error will show here -->
        <small id="emailError"></small>
      </div>

      <!-- Password field group -->
      <div class="form-group">
        <label for="password">Password</label>

        <div class="password-box">
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
          >

          <!-- Show/hide password button -->
          <button type="button" id="togglePassword">
            Show
          </button>
        </div>

        <!-- Password error will show here -->
        <small id="passwordError"></small>
      </div>

      <!-- Login button -->
      <button type="submit" class="login-btn">
        Login
      </button>

    </form>

    <!-- Final success/error message -->
    <p id="message"></p>

    <!-- Demo credentials for students -->
    <div class="demo-box">
      <h3>Demo Login</h3>
      <p><strong>Email:</strong> student@example.com</p>
      <p><strong>Password:</strong> 123456</p>
    </div>

  </div>

  <!-- External JavaScript file -->
  <script src="script.js"></script>
</body>
</html>
