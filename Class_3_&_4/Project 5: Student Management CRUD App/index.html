<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Supports modern characters and symbols -->
  <meta charset="UTF-8">

  <!-- Makes the website responsive on mobile, tablet, and desktop -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Browser tab title -->
  <title>Student Management CRUD App</title>

  <!-- External CSS file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Main page wrapper -->
  <div class="app-container">

    <!-- Page header -->
    <header class="header">
      <h1>Student Management CRUD App</h1>
      <p>Add, view, edit, and delete student records using JavaScript</p>
    </header>

    <!-- Main layout -->
    <main class="main-layout">

      <!-- Left side: student form -->
      <section class="form-card">
        <h2 id="formTitle">Add New Student</h2>

        <!-- 
          Student form.
          JavaScript will select this form using id="studentForm".
        -->
        <form id="studentForm">

          <!-- Hidden input to store editing student id -->
          <input type="hidden" id="studentId">

          <!-- Student name -->
          <div class="form-group">
            <label for="studentName">Student Name</label>
            <input 
              type="text" 
              id="studentName" 
              placeholder="Enter student name"
            >
          </div>

          <!-- Student email -->
          <div class="form-group">
            <label for="studentEmail">Email Address</label>
            <input 
              type="email" 
              id="studentEmail" 
              placeholder="Enter email address"
            >
          </div>

          <!-- Student phone -->
          <div class="form-group">
            <label for="studentPhone">Phone Number</label>
            <input 
              type="text" 
              id="studentPhone" 
              placeholder="Enter phone number"
            >
          </div>

          <!-- Student course -->
          <div class="form-group">
            <label for="studentCourse">Course</label>
            <select id="studentCourse">
              <option value="">Select course</option>
              <option value="HTML & CSS">HTML & CSS</option>
              <option value="JavaScript">JavaScript</option>
              <option value="React.js">React.js</option>
              <option value="Full Stack Development">Full Stack Development</option>
            </select>
          </div>

          <!-- Student age -->
          <div class="form-group">
            <label for="studentAge">Age</label>
            <input 
              type="number" 
              id="studentAge" 
              placeholder="Enter age"
            >
          </div>

          <!-- Error or success message -->
          <p id="message"></p>

          <!-- Submit button -->
          <button type="submit" id="submitBtn">
            Add Student
          </button>

          <!-- Cancel edit button -->
          <button type="button" id="cancelBtn" class="cancel-btn">
            Cancel Edit
          </button>

        </form>
      </section>

      <!-- Right side: student list -->
      <section class="list-card">
        <div class="list-header">
          <h2>Student List</h2>
          <p id="studentCount">Total Students: 0</p>
        </div>

        <!-- Search input -->
        <input 
          type="text" 
          id="searchInput" 
          placeholder="Search student by name or course..."
        >

        <!-- Student table wrapper -->
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Course</th>
                <th>Age</th>
                <th>Actions</th>
              </tr>
            </thead>

            <!-- JavaScript will insert rows here -->
            <tbody id="studentTableBody"></tbody>
          </table>
        </div>
      </section>

    </main>

  </div>

  <!-- External JavaScript file -->
  <script src="script.js"></script>
</body>
</html>
